<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI彼女チャット</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ① 名前入力画面 -->
  <div class="screen active" id="userNameScreen">
    <h2>あなたの名前を教えてね💕</h2>
    <input type="text" id="userNameInput" placeholder="例：ゆうき" />
    <button id="saveUserNameBtn">はじめる</button>
  </div>

  <!-- ② ホーム画面（キャラ選択） -->
  <div class="screen" id="homeScreen">
    <h2>AI彼女を選んでね💕</h2>
    <div id="characterList" class="character-list"></div>
    <button id="changeNameBtn">名前を変更する</button>
  </div>

  <!-- ③ チャット画面 -->
  <div class="screen" id="chatScreen">
    <h2 id="chatTitle">チャット画面</h2>
    <div id="loveLevelDisplay">💗 親密度：0</div>
    <div id="chatLog" class="chat-log"></div>
    <input type="text" id="userInput" placeholder="メッセージを入力..." />
    <div class="chat-buttons">
      <button id="sendBtn">送信</button>
      <button id="resetBtn">リセット</button>
      <button id="backBtn">戻る</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
