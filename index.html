<!DOCTYPE html>
<link rel="manifest" href="manifest.json" />
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI彼女チャット</title>
  <script defer src="script.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    h1, h2 {
      text-align: center;
      color: #e91e63;
      margin: 20px 0 10px;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
    }

    .character-card {
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .character-card img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 15px;
    }

    #chatLog {
      width: 90%;
      max-width: 500px;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      height: 55vh;
      overflow-y: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .message {
      padding: 10px 14px;
      border-radius: 18px;
      margin: 6px 0;
      display: inline-block;
      max-width: 75%;
      word-wrap: break-word;
    }

    .user {
      background-color: #dcf8c6;
      float: right;
      text-align: right;
    }

    .ai {
      background-color: #ffffff;
      border: 1px solid #ccc;
      float: left;
      text-align: left;
    }

    #inputArea {
      width: 90%;
      max-width: 500px;
      display: flex;
      margin: 12px 0;
    }

    #userInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    #sendBtn, #resetBtn, #downloadBtn {
      padding: 8px 12px;
      margin-left: 5px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
    }

    #sendBtn {
      background-color: #e91e63;
      color: white;
    }

    #resetBtn {
      background-color: #9e9e9e;
      color: white;
    }

    #downloadBtn {
      background-color: #607d8b;
      color: white;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      h1, h2 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <!-- 🏠 ホーム画面 -->
  <div id="homeScreen" class="screen active">
    <h1>AI彼女を選んでね💘</h1>
    <div id="characterList"></div>
  </div>

  <!-- 💬 チャット画面 -->
  <div id="chatScreen" class="screen">
    <h2 id="chatTitle">チャット</h2>
    <div id="chatLog"></div>
    <button id="downloadBtn" onclick="downloadLog()">このキャラのログを保存</button>
    <button id="resetBtn">ログをリセット</button>
    <div id="inputArea">
      <input type="text" id="userInput" placeholder="話しかけてみてね…" />
      <button id="sendBtn">送信</button>
    </div>
  </div>

</body>
</html>
